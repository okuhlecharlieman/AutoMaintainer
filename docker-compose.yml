services:
  nginx:
    image: nginx:alpine
    container_name: automaintainer-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - automaintainer-net

  frontend:
    build: ./frontend
    container_name: automaintainer-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - automaintainer-net

  backend:
    build: ./backend
    container_name: automaintainer-backend
    expose:
      - "8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-plus}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-default-secret}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./automaintainer.db}
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:80
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - SANDBOX_ENABLED=${SANDBOX_ENABLED:-true}
      - SANDBOX_TIMEOUT=${SANDBOX_TIMEOUT:-30}
    volumes:
      - backend-data:/app
    restart: unless-stopped
    networks:
      - automaintainer-net

volumes:
  backend-data:

networks:
  automaintainer-net:
    driver: bridge
